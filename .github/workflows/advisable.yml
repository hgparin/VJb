name: successive

on:
  push:

jobs:
  community:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tedious: ["just", "casual", "owing", "desirable", "prejudice"]
        healthy: ["roar", "insure", "insert", "exploit"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar it.jar
